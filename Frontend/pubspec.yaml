name: yatri_dashboard
description: A pixel‑perfect Flutter frontend for the Yatri Driver Dashboard.
publish_to: 'none' # private package
version: 1.0.0+1
environment:
  sdk: "^3.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.0.0
  intl: ^0.18.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  dio: ^5.4.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0

  # The following adds the Cupertino icons font to your application.
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/profile_image.jpg
    - assets/logo/
